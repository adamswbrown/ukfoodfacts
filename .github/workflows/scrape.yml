name: Scrape Nutrition Data

on:
  schedule:
    # Run daily at 06:15 UTC (avoid :00/:30 to reduce GitHub Actions queue delays)
    - cron: "15 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps (even if browser cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run scrapers
        run: python main.py

      - name: Prune old logs (keep last 30)
        run: |
          cd output/logs 2>/dev/null || exit 0
          ls -t scrape-*.json | tail -n +31 | xargs -r rm --

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet output/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/nutrition_db.json output/logs/
          git commit -m "chore: update nutrition data $(date -u +%Y-%m-%d) — $(python -c "import json; d=json.load(open('output/nutrition_db.json')); print(f'{len(d)} items, {len(set(i[\"restaurant\"] for i in d))} restaurants')")"
          git push
